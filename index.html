<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аукцион заказов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <!-- Telegram Web App API через CDN -->
    <script src="https://anzorahai.github.io/Kargner/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Страница авторизации -->
        <div id="auth-section">
            <h2>Авторизация</h2>
            <div id="auth-buttons">
                <button onclick="showLoginForm()">Вход</button>
                <button onclick="showRegisterForm()">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <form id="login-form" style="display: none;">
                <input type="text" id="login-username" placeholder="Имя пользователя" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>

            <!-- Форма регистрации -->
            <form id="register-form" style="display: none;">
                <input type="text" id="register-username" placeholder="Имя пользователя" required>
                <input type="password" id="register-password" placeholder="Пароль" required>
                <input type="tel" id="register-phone" placeholder="Номер телефона" required>
                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>

        <!-- Остальные разделы (будут скрыты до авторизации) -->
        <div id="main-sections" style="display: none;">
            <!-- Доска заказов -->
            <div id="orders-board">
                <h2>Доска заказов</h2>
                <div id="orders-list"></div>
            </div>

            <!-- Детали заказа -->
            <div id="order-details" style="display: none;">
                <button onclick="goBack()">← Назад</button>
                <div id="order-content"></div>
            </div>

            <!-- Мои заказы -->
            <div id="my-orders">
                <h2>Мои заказы</h2>
                <div id="my-orders-list"></div>
            </div>

            <!-- Мой профиль -->
            <div id="profile">
                <h2>Мой профиль</h2>
                <div id="profile-info"></div>
            </div>

            <!-- Кабинет администратора -->
            <div id="admin" style="display: none;">
                <h2>Кабинет администратора</h2>
                <form id="create-order-form">
                    <input type="text" id="order-title" placeholder="Название заказа" required>
                    <textarea id="order-description" placeholder="Описание заказа" required></textarea>
                    <input type="text" id="order-address" placeholder="Адрес" required>
                    <input type="file" id="order-photo" accept="image/*" required>
                    <button type="submit">Создать заказ</button>
                </form>
                <h3>Назначить администратора</h3>
                <input type="text" id="admin-id" placeholder="Введите Telegram ID">
                <button onclick="assignAdmin()">Назначить</button>
            </div>
        </div>
    </div>

    <!-- Меню снизу -->
    <div class="bottom-menu" style="display: none;">
        <button onclick="showSection('orders-board')">
            <i class="fas fa-home"></i>
            <span>Заказы</span>
        </button>
        <button onclick="showSection('my-orders')">
            <i class="fas fa-tasks"></i>
            <span>Мои заказы</span>
        </button>
        <button onclick="showSection('profile')">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </button>
        <button id="admin-button" style="display: none;" onclick="showSection('admin')">
            <i class="fas fa-cog"></i>
            <span>Админ</span>
        </button>
    </div>

    <!-- Подключите app.js как модуль -->
    <script type="module" src="app.js"></script>
</body>
</html>
