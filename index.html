<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аукцион заказов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <!-- Telegram Web App API через CDN -->
    <script src="https://anzorahai.github.io/Kargner/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Формы авторизации (показываются, если пользователь не из Telegram) -->
        <div id="auth-section">
            <h2>Авторизация</h2>
            <div id="auth-buttons">
                <button id="login-button">Вход</button>
                <button id="register-button">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <form id="login-form" style="display: none;">
                <input type="text" id="login-username" placeholder="Имя пользователя" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>

            <!-- Форма регистрации -->
            <form id="register-form" style="display: none;">
                <input type="text" id="register-username" placeholder="Имя пользователя" required>
                <input type="password" id="register-password" placeholder="Пароль" required>
                <input type="tel" id="register-phone" placeholder="Номер телефона" required>
                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>

        <!-- Основные разделы (показываются после авторизации) -->
        <div id="main-sections" style="display: none;">
            <!-- Доска заказов, профиль, кабинет администратора и т.д. -->
        </div>
    </div>

    <!-- Подключите app.js как модуль -->
    <script type="module" src="app.js"></script>
</body>
</html>
