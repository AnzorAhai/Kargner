<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аукцион заказов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js"></script>
    <!-- Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Регистрация -->
        <div id="registration-section">
            <h2>Регистрация</h2>
            <form id="registration-form">
                <input type="text" id="firstName" placeholder="Имя" required>
                <input type="text" id="lastName" placeholder="Фамилия" required>
                <input type="tel" id="phone" placeholder="Номер телефона" required>
                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>

        <!-- Доска заказов -->
        <div id="orders-board" style="display: none;">
            <h2>Доска заказов</h2>
            <div id="orders-list"></div>
        </div>

        <!-- Детали заказа -->
        <div id="order-details" style="display: none;">
            <button onclick="goBack()">← Назад</button>
            <div id="order-content"></div>
        </div>

        <!-- Мои заказы -->
        <div id="my-orders" style="display: none;">
            <h2>Мои заказы</h2>
            <div id="my-orders-list"></div>
        </div>

        <!-- Мой профиль -->
        <div id="profile" style="display: none;">
            <h2>Мой профиль</h2>
            <div id="profile-info"></div>
        </div>
    </div>

    <!-- Меню снизу -->
    <div class="bottom-menu">
        <button onclick="showSection('orders-board')">
            <i class="fas fa-home"></i>
            <span>Заказы</span>
        </button>
        <button onclick="showSection('my-orders')">
            <i class="fas fa-tasks"></i>
            <span>Мои заказы</span>
        </button>
        <button onclick="showSection('profile')">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
