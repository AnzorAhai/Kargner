<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аукцион заказов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <!-- Telegram Web App API через CDN -->
    <script src="https://unpkg.com/telegram-web-app"></script>
</head>
<body>
    <div class="container">
        <!-- Регистрация -->
        <div id="registration-section">
            <h2>Регистрация</h2>
            <form id="registration-form">
                <input type="text" id="firstName" placeholder="Имя" required>
                <input type="text" id="lastName" placeholder="Фамилия" required>
                <input type="tel" id="phone" placeholder="Номер телефона" required>
                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>

        <!-- Доска заказов -->
        <div id="orders-board" style="display: none;">
            <h2>Доска заказов</h2>
            <div id="orders-list"></div>
        </div>

        <!-- Детали заказа -->
        <div id="order-details" style="display: none;">
            <button onclick="goBack()">← Назад</button>
            <div id="order-content"></div>
        </div>

        <!-- Мои заказы -->
        <div id="my-orders" style="display: none;">
            <h2>Мои заказы</h2>
            <div id="my-orders-list"></div>
        </div>

        <!-- Мой профиль -->
        <div id="profile" style="display: none;">
            <h2>Мой профиль</h2>
            <div id="profile-info"></div>
        </div>

        <!-- Кабинет администратора -->
        <div id="admin" style="display: none;">
            <h2>Кабинет администратора</h2>
            <form id="create-order-form">
                <input type="text" id="order-title" placeholder="Название заказа" required>
                <textarea id="order-description" placeholder="Описание заказа" required></textarea>
                <input type="text" id="order-address" placeholder="Адрес" required>
                <input type="file" id="order-photo" accept="image/*" required>
                <button type="submit">Создать заказ</button>
            </form>
            <h3>Назначить администратора</h3>
            <input type="text" id="admin-id" placeholder="Введите Telegram ID">
            <button onclick="assignAdmin()">Назначить</button>
        </div>
    </div>

    <!-- Меню снизу -->
    <div class="bottom-menu">
        <button onclick="showSection('orders-board')">
            <i class="fas fa-home"></i>
            <span>Заказы</span>
        </button>
        <button onclick="showSection('my-orders')">
            <i class="fas fa-tasks"></i>
            <span>Мои заказы</span>
        </button>
        <button onclick="showSection('profile')">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </button>
        <button id="admin-button" style="display: none;" onclick="showSection('admin')">
            <i class="fas fa-cog"></i>
            <span>Админ</span>
        </button>
    </div>

    <!-- Подключите app.js как модуль -->
    <script type="module" src="app.js"></script>
</body>
</html>
